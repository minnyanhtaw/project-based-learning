<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="flex.css" />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .container {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: end;
    }

    .item {
      width: 100px;
      height: 100px;
      background-color: red;
    }

    .item1 {
      width: 100px;
      height: 200px;
      background-color: green;
    }
  </style>
  <body>
    <div class="container">
      <div class="item1"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
  </body>
</html>
